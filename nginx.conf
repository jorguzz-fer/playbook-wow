server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Mantém o acesso também pela URL /playbook.html
    location = /playbook.html {
        return 301 /;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache leve para o HTML (imagens já vêm embutidas em base64)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/html text/css application/javascript;
    gzip_min_length 1024;
}
