# ─────────────────────────────────────────────────────────────
# PLAYBOOK — servidor padrão (playbook.wowmais.com.br e demais hosts)
# Serve o playbook + páginas avulsas (/estudo-b2b/, /plano360/, etc.)
# ─────────────────────────────────────────────────────────────
server {
    listen       80 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Mantém o acesso também pela URL /playbook.html
    location = /playbook.html {
        return 301 /;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache leve para o HTML (imagens já vêm embutidas em base64)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/html text/css application/javascript;
    gzip_min_length 1024;
}

# ─────────────────────────────────────────────────────────────
# PROPOSTAS — branch dedicada (propostas.wowmais.com.br)
# Árvore isolada: /julio/ampro/, etc. Não expõe o playbook.
# ─────────────────────────────────────────────────────────────
server {
    listen       80;
    server_name  propostas.wowmais.com.br;

    root   /usr/share/nginx/propostas;
    index  index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Força download dos PDFs com nome de arquivo
    location ~* \.pdf$ {
        add_header Content-Disposition "attachment";
    }

    gzip on;
    gzip_types text/html text/css application/javascript;
    gzip_min_length 1024;
}
